version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-screener-backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-screener-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
